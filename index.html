<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quota Command Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Mono:wght@700&display=swap');

        :root {
            --bg-base: #060608;
            --panel-bg: rgba(20, 20, 24, 0.45);
            --panel-border: rgba(255, 255, 255, 0.08);
            
            --gemini-start: #00e5ff;
            --gemini-end: #0077ff;
            
            --claude-start: #ff9d00;
            --claude-end: #ff3366;
            
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; /* Forzar el alto a la ventana exacta */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow: hidden; /* Eliminar TODO el scroll */
            position: relative;
        }

        /* Ambient Aurora Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            z-index: 0;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: rgba(0, 229, 255, 0.15); top: -100px; left: 10%; }
        .orb-2 { width: 500px; height: 500px; background: rgba(138, 43, 226, 0.15); bottom: -150px; right: 10%; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: rgba(255, 157, 0, 0.1); top: 40%; left: 40%; animation-duration: 25s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.2); }
        }

        /* Container - Ahora en Grid lado a lado */
        .dashboard {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Cuadros exactos */
            gap: 2.5rem;
            align-items: center;
        }

        /* Responsive por si se achica mucho la pantalla */
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
                max-height: 90vh;
                overflow-y: auto;
            }
        }

        /* Pill Panel */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--panel-border);
            border-radius: 40px;
            padding: 2rem 2.5rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .panel:nth-child(2) {
            animation-delay: 0.15s;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Close Button inside panel (like the reference) */
        .close-btn {
            position: absolute;
            top: 2rem;
            right: 2.5rem;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: rgba(255,255,255,0.05);
        }

        .close-btn::before, .close-btn::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 2px;
            background: #8b9bb4;
            border-radius: 2px;
        }

        .close-btn::before { transform: rotate(45deg); }
        .close-btn::after { transform: rotate(-45deg); }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .panel-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Progress Item */
        .progress-item {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .progress-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            min-height: 20px;
        }

        .progress-percent {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* Horizontal Bar */
        .bar-track {
            width: 100%;
            height: 16px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            padding: 2px;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 1.5s cubic-bezier(0.25, 1, 0.3, 1);
            position: relative;
        }

        /* Gradients and Glows */
        .fill-gemini {
            background: linear-gradient(90deg, var(--gemini-start), var(--gemini-end));
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        .fill-claude {
            background: linear-gradient(90deg, var(--claude-start), var(--claude-end));
            box-shadow: 0 0 20px rgba(255, 157, 0, 0.6);
        }

        .fill-success {
            background: linear-gradient(90deg, #00ff66, #00b347);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.6);
        }

        /* Inner light highlight for the bar to give it a 3D pill look */
        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border-radius: 20px;
        }

    </style>
</head>
<body>

    <!-- Aurora Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="dashboard">
        
        <!-- Gemini Panel -->
        <div class="panel">
            <div class="close-btn" onclick="location.reload()"></div>
            <div class="panel-header">
                <div class="panel-title">Gemini Series</div>
            </div>

            <!-- Weekly -->
            <div class="progress-item">
                <div class="progress-header">
                    <div>
                        <div class="progress-label">Weekly Limit</div>
                        <div class="progress-desc" id="gemini-weekly-desc">Initializing...</div>
                    </div>
                    <div class="progress-percent" id="gemini-weekly-val">0%</div>
                </div>
                <div class="bar-track">
                    <div class="bar-fill fill-gemini" id="gemini-weekly-bar"></div>
                </div>
            </div>

            <!-- 5 Hour -->
            <div class="progress-item">
                <div class="progress-header">
                    <div>
                        <div class="progress-label">5-Hour Window</div>
                        <div class="progress-desc" id="gemini-five-desc">Initializing...</div>
                    </div>
                    <div class="progress-percent" id="gemini-five-val">0%</div>
                </div>
                <div class="bar-track">
                    <div class="bar-fill fill-gemini" id="gemini-five-bar"></div>
                </div>
            </div>
        </div>

        <!-- Claude / GPT Panel -->
        <div class="panel">
            <div class="close-btn" onclick="location.reload()"></div>
            <div class="panel-header">
                <div class="panel-title">Claude & GPT</div>
            </div>

            <!-- Weekly -->
            <div class="progress-item">
                <div class="progress-header">
                    <div>
                        <div class="progress-label">Weekly Limit</div>
                        <div class="progress-desc" id="claude-weekly-desc">Initializing...</div>
                    </div>
                    <div class="progress-percent" id="claude-weekly-val">0%</div>
                </div>
                <div class="bar-track">
                    <div class="bar-fill fill-claude" id="claude-weekly-bar"></div>
                </div>
            </div>

            <!-- 5 Hour -->
            <div class="progress-item">
                <div class="progress-header">
                    <div>
                        <div class="progress-label">5-Hour Window</div>
                        <div class="progress-desc" id="claude-five-desc">Initializing...</div>
                    </div>
                    <div class="progress-percent" id="claude-five-val">0%</div>
                </div>
                <div class="bar-track">
                    <div class="bar-fill fill-claude" id="claude-five-bar"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function animateNumber(element, endValue, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const current = Math.floor(easeProgress * endValue);
                element.textContent = current + '%';
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    element.textContent = endValue + '%';
                }
            };
            window.requestAnimationFrame(step);
        }

        function updateBar(barId, textId, percent) {
            const bar = document.getElementById(barId);
            const textEl = document.getElementById(textId);
            
            if (percent === 100) {
                bar.className = 'bar-fill fill-success';
            }
            
            setTimeout(() => {
                bar.style.width = percent + '%';
                animateNumber(textEl, percent, 1500);
            }, 300);
        }

        async function loadDashboard() {
            try {
                // Anti-caching: Se agrega '?t=' para evitar que el navegador guarde una versión vieja
                const response = await fetch('tokens.json?t=' + new Date().getTime(), {
                    cache: 'no-store'
                });
                
                if(!response.ok) throw new Error("JSON not found");
                
                const data = await response.json();

                // Gemini
                document.getElementById('gemini-weekly-desc').textContent = data.gemini.weekly.text;
                document.getElementById('gemini-five-desc').textContent = data.gemini.five_hour.text;
                updateBar('gemini-weekly-bar', 'gemini-weekly-val', data.gemini.weekly.percent);
                updateBar('gemini-five-bar', 'gemini-five-val', data.gemini.five_hour.percent);

                // Claude & GPT
                document.getElementById('claude-weekly-desc').textContent = data.claude_gpt.weekly.text;
                document.getElementById('claude-five-desc').textContent = data.claude_gpt.five_hour.text;
                updateBar('claude-weekly-bar', 'claude-weekly-val', data.claude_gpt.weekly.percent);
                updateBar('claude-five-bar', 'claude-five-val', data.claude_gpt.five_hour.percent);

            } catch (error) {
                console.error("Error reading tokens.json", error);
                document.getElementById('gemini-weekly-desc').textContent = "Esperando sincronización...";
            }
        }

        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
