<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quota Command Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap');

        :root {
            --bg-base: #060608;
            --panel-bg: rgba(20, 20, 24, 0.45);
            --panel-border: rgba(255, 255, 255, 0.06);
            
            --gemini-start: #00e5ff;
            --gemini-end: #0077ff;
            
            --claude-start: #ff9d00;
            --claude-end: #ff3366;
            
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Aurora Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 500px; height: 500px; background: rgba(0, 229, 255, 0.15); top: -100px; left: 5%; }
        .orb-2 { width: 600px; height: 600px; background: rgba(138, 43, 226, 0.15); bottom: -150px; right: 5%; animation-delay: -5s; }
        .orb-3 { width: 400px; height: 400px; background: rgba(255, 157, 0, 0.1); top: 30%; left: 30%; animation-duration: 25s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -60px) scale(1.1); }
        }

        /* Container - Mucho más amplio y espacioso */
        .dashboard {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1500px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3.5rem;
            align-items: center;
        }

        /* Pill Panel - Más padding para dar respiro (menos compacto) */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--panel-border);
            border-radius: 40px;
            padding: 3.5rem 4rem; /* Aumento drástico de padding */
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 3.5rem; /* Separación mucho mayor entre elementos */
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .panel:nth-child(2) {
            animation-delay: 0.15s;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 2.5rem;
            right: 3rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .close-btn:hover { background: rgba(255,255,255,0.08); }

        .close-btn::before, .close-btn::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 2px;
            background: #8b9bb4;
            border-radius: 2px;
        }

        .close-btn::before { transform: rotate(45deg); }
        .close-btn::after { transform: rotate(-45deg); }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .panel-title {
            font-size: 2rem; /* Título más grande */
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Progress Item */
        .progress-item {
            display: flex;
            flex-direction: column;
            gap: 1.5rem; /* Más aire entre el texto y la barra */
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .progress-label {
            font-size: 1.25rem; /* Textos más grandes */
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }

        .progress-desc {
            font-size: 0.95rem; /* Texto secundario más legible */
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 85%;
        }

        .progress-percent {
            font-family: 'Space Mono', monospace;
            font-size: 1.6rem; /* Porcentajes más prominentes */
            font-weight: 700;
            color: #ffffff;
            margin-top: -0.2rem;
        }

        /* Horizontal Bar - Más gruesa y prominente */
        .bar-track {
            width: 100%;
            height: 24px; /* Barra mucho más alta */
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            padding: 3px;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 1.5s cubic-bezier(0.25, 1, 0.3, 1);
            position: relative;
        }

        .fill-gemini {
            background: linear-gradient(90deg, var(--gemini-start), var(--gemini-end));
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
        }

        .fill-claude {
            background: linear-gradient(90deg, var(--claude-start), var(--claude-end));
            box-shadow: 0 0 25px rgba(255, 157, 0, 0.6);
        }

        .fill-success {
            background: linear-gradient(90deg, #00ff66, #00b347);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.6);
        }

        /* Inner light highlight for the bar to give it a 3D pill look */
        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border-radius: 20px;
        }

    </style>
</head>
<body>

    <!-- Aurora Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="dashboard">
        
        <!-- Gemini Panel -->
        <div class="panel">
            <div class="close-btn" onclick="location.reload()"></div>
            <div class="panel-header">
                <div class="panel-title">Gemini Series</div>
            </div>

            <!-- Weekly -->
            <div class="progress-item">
                <div class="progress-header">
                    <div>
                        <div class="progress-label">Weekly Limit</div>
                        <div class="progress-desc" id="gemini-weekly-desc">Initializing data...</div>
                    </div>
                    <div class="progress-percent" id="gemini-weekly-val">0%</div>
                </div>
                <div class="bar-track">
                    <div class="bar-fill fill-gemini" id="gemini-weekly-bar"></div>
                </div>
            </div>

            <!-- 5 Hour -->
            <div class="progress-item">
                <div class="progress-header">
                    <div>
                        <div class="progress-label">5-Hour Window</div>
                        <div class="progress-desc" id="gemini-five-desc">Initializing data...</div>
                    </div>
                    <div class="progress-percent" id="gemini-five-val">0%</div>
                </div>
                <div class="bar-track">
                    <div class="bar-fill fill-gemini" id="gemini-five-bar"></div>
                </div>
            </div>
        </div>

        <!-- Claude / GPT Panel -->
        <div class="panel">
            <div class="close-btn" onclick="location.reload()"></div>
            <div class="panel-header">
                <div class="panel-title">Claude & GPT</div>
            </div>

            <!-- Weekly -->
            <div class="progress-item">
                <div class="progress-header">
                    <div>
                        <div class="progress-label">Weekly Limit</div>
                        <div class="progress-desc" id="claude-weekly-desc">Initializing data...</div>
                    </div>
                    <div class="progress-percent" id="claude-weekly-val">0%</div>
                </div>
                <div class="bar-track">
                    <div class="bar-fill fill-claude" id="claude-weekly-bar"></div>
                </div>
            </div>

            <!-- 5 Hour -->
            <div class="progress-item">
                <div class="progress-header">
                    <div>
                        <div class="progress-label">5-Hour Window</div>
                        <div class="progress-desc" id="claude-five-desc">Initializing data...</div>
                    </div>
                    <div class="progress-percent" id="claude-five-val">0%</div>
                </div>
                <div class="bar-track">
                    <div class="bar-fill fill-claude" id="claude-five-bar"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function animateNumber(element, endValue, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const current = Math.floor(easeProgress * endValue);
                element.textContent = current + '%';
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    element.textContent = endValue + '%';
                }
            };
            window.requestAnimationFrame(step);
        }

        function updateBar(barId, textId, percent) {
            const bar = document.getElementById(barId);
            const textEl = document.getElementById(textId);
            
            if (percent === 100) {
                bar.className = 'bar-fill fill-success';
            }
            
            setTimeout(() => {
                bar.style.width = percent + '%';
                animateNumber(textEl, percent, 1500);
            }, 300);
        }

        async function loadDashboard() {
            try {
                // Fetch con anti-cache extremo
                const response = await fetch('tokens.json?t=' + new Date().getTime(), {
                    cache: 'no-store'
                });
                
                if(!response.ok) throw new Error("JSON not found");
                
                const data = await response.json();

                // Gemini
                document.getElementById('gemini-weekly-desc').textContent = data.gemini.weekly.text;
                document.getElementById('gemini-five-desc').textContent = data.gemini.five_hour.text;
                updateBar('gemini-weekly-bar', 'gemini-weekly-val', data.gemini.weekly.percent);
                updateBar('gemini-five-bar', 'gemini-five-val', data.gemini.five_hour.percent);

                // Claude & GPT
                document.getElementById('claude-weekly-desc').textContent = data.claude_gpt.weekly.text;
                document.getElementById('claude-five-desc').textContent = data.claude_gpt.five_hour.text;
                updateBar('claude-weekly-bar', 'claude-weekly-val', data.claude_gpt.weekly.percent);
                updateBar('claude-five-bar', 'claude-five-val', data.claude_gpt.five_hour.percent);

            } catch (error) {
                console.error("Error reading tokens.json", error);
                document.getElementById('gemini-weekly-desc').textContent = "Esperando actualización del script de Python...";
            }
        }

        window.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
