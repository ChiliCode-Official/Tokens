<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Tokens - Antigravity IDE</title>
    <!-- Cargamos la librería para hacer gráficos bonitos -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin-top: 20px;
        }
        h1 { color: #1a73e8; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .chart-box { width: 100%; height: 300px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tokens Consumidos</h1>
        <p>Google Antigravity IDE • Actualizado automáticamente</p>
        
        <div class="chart-box">
            <canvas id="graficoTokens"></canvas>
        </div>
    </div>

    <script>
        // Esta función lee el archivo tokens.json que sube tu script de Python
        fetch('tokens.json')
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('graficoTokens').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut', // Gráfico de dona moderno
                    data: {
                        labels: Object.keys(data),
                        datasets: [{
                            data: Object.values(data),
                            backgroundColor: ['#4285F4', '#34A853', '#FBBC05'] // Colores estilo Google
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false
                    }
                });
            })
            .catch(error => console.error("Error cargando los tokens:", error));
    </script>
</body>
</html>
